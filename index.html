<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SKU Scanner</title>
<style>
  :root{
    --bg:#0a0b0f;
    --panel:#14161d;
    --panel-2:#191c25;
    --line:#242732;
    --accent:#ffb454;
    --accent-ink:#231605;
    --text:#f4f2ee;
    --sub:#8a8f9c;
    --miss:#ff6b5e;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  }
  .app{
    padding-top:calc(var(--safe-t) + 6px);
    padding-bottom:calc(var(--safe-b) + 10px);
    max-width:480px;
    margin:0 auto;
  }

  header{
    padding:8px 18px 10px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  h1{
    font-size:17px;
    margin:0;
    font-weight:650;
    letter-spacing:-0.01em;
  }
  .badge{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent);
    background:rgba(255,180,84,0.12);
    padding:4px 8px;
    border-radius:6px;
  }

  .camera-wrap{
    position:relative;
    margin:2px 16px 12px;
    width:calc(100% - 32px);
    aspect-ratio:1/1;
    border-radius:20px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 0 1px var(--line);
  }
  video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .corner{
    position:absolute;
    width:24px; height:24px;
    border:2.5px solid var(--accent);
    opacity:0.85;
    pointer-events:none;
  }
  .corner.tl{ top:7%; left:7%; border-right:none; border-bottom:none; border-top-left-radius:8px; }
  .corner.tr{ top:7%; right:7%; border-left:none; border-bottom:none; border-top-right-radius:8px; }
  .corner.bl{ bottom:7%; left:7%; border-right:none; border-top:none; border-bottom-left-radius:8px; }
  .corner.br{ bottom:7%; right:7%; border-left:none; border-top:none; border-bottom-right-radius:8px; }

  .status-pill{
    position:absolute;
    top:12px; left:50%;
    transform:translateX(-50%);
    background:rgba(10,11,15,0.62);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    padding:6px 13px;
    border-radius:100px;
    font-size:11.5px;
    color:var(--text);
    letter-spacing:0.01em;
    white-space:nowrap;
    max-width:88%;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .flash{
    position:absolute; inset:0;
    background:var(--accent);
    opacity:0;
    pointer-events:none;
  }
  .flash.hit{ animation:flash 320ms ease-out; }
  @keyframes flash{ 0%{opacity:0.5;} 100%{opacity:0;} }

  .scan-btn{
    display:block;
    width:calc(100% - 32px);
    margin:0 16px 14px;
    background:var(--accent);
    color:var(--accent-ink);
    border:none;
    border-radius:14px;
    padding:15px 0;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.02em;
  }
  .scan-btn:active{ transform:scale(0.98); }
  .scan-btn.busy{ background:var(--panel-2); color:var(--sub); }
  .scan-btn.miss{ background:var(--miss); color:#20100d; }

  .unsupported{
    padding:28px 24px;
    text-align:center;
    color:var(--sub);
    font-size:13.5px;
    line-height:1.6;
  }
  .unsupported b{ color:var(--text); }

  .result-card{
    margin:0 16px 12px;
    padding:16px 18px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .result-card .empty{
    color:var(--sub);
    font-size:13.5px;
  }
  .result-card .code{
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    font-size:21px;
    font-weight:650;
    letter-spacing:-0.01em;
    word-break:break-all;
    line-height:1.25;
  }
  .result-card .copied-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--accent);
    margin-top:5px;
  }
  .copy-btn{
    flex-shrink:0;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:10px;
    padding:10px 16px;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
  }
  .copy-btn:active{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }

  .manual-row{
    display:flex;
    gap:8px;
    padding:0 16px 10px;
  }
  .manual-row input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:11px;
    color:var(--text);
    padding:11px 13px;
    font-family:inherit;
    font-size:14px;
    min-width:0;
  }
  .manual-row input::placeholder{ color:var(--sub); }
  .manual-row input:focus{ outline:none; border-color:var(--accent); }
  .manual-row button{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:11px;
    padding:0 18px;
    font-family:inherit;
    font-size:13px;
    font-weight:650;
    flex-shrink:0;
  }

  .history{
    max-height:34vh;
    overflow-y:auto;
    border-top:1px solid var(--line);
  }
  .history-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 18px 4px;
  }
  .history-head span{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:650;
  }
  .history-head button{
    background:none;
    border:none;
    color:var(--sub);
    font-family:inherit;
    font-size:12px;
  }
  ul.log{
    list-style:none;
    margin:0;
    padding:0 18px 8px;
  }
  ul.log li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    gap:10px;
  }
  ul.log li:last-child{ border-bottom:none; }
  ul.log .code{
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    font-size:13.5px;
    word-break:break-all;
  }
  ul.log .time{ font-size:10.5px; color:var(--sub); flex-shrink:0; margin-top:2px; }
  ul.log button{
    background:none;
    border:1px solid var(--line);
    color:var(--sub);
    border-radius:7px;
    padding:5px 9px;
    font-size:10.5px;
    font-weight:650;
    font-family:inherit;
    flex-shrink:0;
  }
  .empty-log{ color:var(--sub); font-size:12.5px; padding:6px 0 12px; }
</style>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="app">
  <header>
    <h1>SKU Scanner</h1>
    <span class="badge">Live</span>
  </header>

  <div id="cameraSection" class="camera-wrap">
    <video id="video" playsinline muted autoplay></video>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="status-pill" id="status">Loading camera...</div>
    <div class="flash" id="flash"></div>
  </div>

  <button class="scan-btn" id="scanBtn">Scan</button>

  <div class="result-card" id="resultCard">
    <div id="resultBody"><span class="empty">No code scanned yet</span></div>
    <button class="copy-btn" id="copyLastBtn" style="display:none;">Copy</button>
  </div>

  <div class="manual-row">
    <input id="manualInput" type="text" inputmode="text" placeholder="Type a SKU manually" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="manualAdd">Add</button>
  </div>

  <div class="history">
    <div class="history-head">
      <span>History</span>
      <button id="clearHistory">Clear</button>
    </div>
    <ul class="log" id="log"></ul>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const statusEl = document.getElementById('status');
  const flashEl = document.getElementById('flash');
  const cameraSection = document.getElementById('cameraSection');
  const logEl = document.getElementById('log');
  const resultBody = document.getElementById('resultBody');
  const copyLastBtn = document.getElementById('copyLastBtn');
  const manualInput = document.getElementById('manualInput');
  const manualAdd = document.getElementById('manualAdd');
  const clearHistoryBtn = document.getElementById('clearHistory');
  const scanBtn = document.getElementById('scanBtn');

  let history = [];
  let lastCode = null;

  function timeString(){
    const d = new Date();
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return h + ':' + m + ' ' + ampm;
  }

  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return Promise.resolve();
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderResult(code){
    resultBody.innerHTML =
      '<div class="code">' + escapeHtml(code) + '</div>' +
      '<div class="copied-tag">&#10003; Copied to clipboard</div>';
    copyLastBtn.style.display = 'inline-block';
    copyLastBtn.textContent = 'Copy again';
  }

  function renderHistory(){
    if(history.length === 0){
      logEl.innerHTML = '<li class="empty-log" style="border:none;">Scanned codes will appear here</li>';
      return;
    }
    logEl.innerHTML = history.map((item, idx) => (
      '<li>' +
        '<div><div class="code">' + escapeHtml(item.code) + '</div><div class="time">' + item.time + '</div></div>' +
        '<button data-idx="' + idx + '">COPY</button>' +
      '</li>'
    )).join('');
  }

  logEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-idx]');
    if(!btn) return;
    const idx = parseInt(btn.getAttribute('data-idx'), 10);
    const item = history[idx];
    if(!item) return;
    copyText(item.code).then(() => {
      btn.textContent = 'DONE';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1100);
    });
  });

  copyLastBtn.addEventListener('click', () => {
    if(!lastCode) return;
    copyText(lastCode).then(() => {
      copyLastBtn.textContent = 'Copied';
      setTimeout(() => { copyLastBtn.textContent = 'Copy again'; }, 1100);
    });
  });

  clearHistoryBtn.addEventListener('click', () => {
    history = [];
    renderHistory();
  });

  function addScan(code){
    lastCode = code;
    history.unshift({code, time: timeString()});
    if(history.length > 50) history.pop();
    renderResult(code);
    renderHistory();
    copyText(code);
    flashEl.classList.remove('hit');
    void flashEl.offsetWidth;
    flashEl.classList.add('hit');
    if(navigator.vibrate) navigator.vibrate(50);
  }

  manualAdd.addEventListener('click', () => {
    const val = manualInput.value.trim();
    if(!val) return;
    addScan(val);
    manualInput.value = '';
  });
  manualInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ manualAdd.click(); }
  });

  renderHistory();

  // Camera preview + tap-to-scan capture (ZXing — pure JS, works on iOS Safari and Android Chrome alike)
  let codeReader = null;
  let videoTrack = null;
  let busy = false;

  async function startCamera(){
    if(typeof ZXing === 'undefined'){
      showUnsupported('Scanning library failed to load — check your connection and reload.');
      return;
    }

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    codeReader = new ZXing.BrowserMultiFormatReader(hints, 150);

    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      videoTrack = stream.getVideoTracks()[0];
      statusEl.textContent = 'Frame the code, then tap Scan';
      scanBtn.disabled = false;
    }catch(err){
      statusEl.textContent = 'Camera access denied — enable it in Settings';
      document.querySelectorAll('.corner').forEach(el => el.style.display = 'none');
      scanBtn.style.display = 'none';
    }
  }

  async function focusAt(){
    if(!videoTrack || !videoTrack.getCapabilities) return;
    try{
      const caps = videoTrack.getCapabilities();
      if(caps.focusMode && caps.focusMode.includes('single-shot')){
        await videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
      }
    }catch(e){ /* not supported on this device — ignore */ }
  }

  // Runs our own frame-capture loop and tries two independent decoders on every frame:
  // jsQR first (a dedicated, extremely reliable QR-only decoder with no dependency on
  // which ZXing convenience methods happen to be bundled), then ZXing's decodeFromImageUrl
  // as a fallback for 1D barcodes (EAN/UPC/Code128/etc), which is confirmed to work in
  // this build.
  async function decodeCanvas(canvas){
    if(typeof jsQR === 'function'){
      try{
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, imageData.width, imageData.height);
        if(qr && qr.data) return qr.data;
      }catch(e){ /* ignore, try ZXing next */ }
    }
    if(codeReader){
      try{
        const result = await codeReader.decodeFromImageUrl(canvas.toDataURL('image/png'));
        if(result) return result.getText();
      }catch(e){ /* not found this way either */ }
    }
    return null;
  }

  async function captureAndScan(){
    if(busy || !video.videoWidth) return;
    busy = true;
    scanBtn.classList.remove('miss');
    scanBtn.classList.add('busy');
    scanBtn.textContent = 'Scanning...';
    statusEl.textContent = 'Analyzing...';

    await focusAt();
    await new Promise(r => setTimeout(r, 150));

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const deadline = Date.now() + 4000;
    let text = null;

    while(Date.now() < deadline){
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      text = await decodeCanvas(canvas);
      if(text) break;
      await new Promise(r => setTimeout(r, 120));
    }

    scanBtn.classList.remove('busy');
    scanBtn.textContent = 'Scan';
    busy = false;

    if(text){
      addScan(text);
      statusEl.textContent = 'Scanned — tap Scan for the next one';
    }else{
      statusEl.textContent = 'No code found — reframe and try again';
      scanBtn.classList.add('miss');
      setTimeout(() => scanBtn.classList.remove('miss'), 900);
    }
  }

  scanBtn.addEventListener('click', captureAndScan);

  function showUnsupported(message){
    cameraSection.innerHTML = '<div class="unsupported">' +
      '<b>' + (message || 'Live camera scanning isn\'t available right now.') + '</b><br><br>' +
      'You can still use the manual entry field below to add SKUs — copy and history work the same either way.' +
      '</div>';
  }

  startCamera();
})();
</script>
</body>
</html>
