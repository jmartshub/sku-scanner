<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SKU Scanner</title>
<style>
  :root{
    --bg:#0a0b0f;
    --panel:#14161d;
    --panel-2:#191c25;
    --line:#242732;
    --accent:#ffb454;
    --accent-ink:#231605;
    --text:#f4f2ee;
    --sub:#8a8f9c;
    --miss:#ff6b5e;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  }
  .app{
    padding-top:calc(var(--safe-t) + 6px);
    padding-bottom:calc(var(--safe-b) + 10px);
    max-width:480px;
    margin:0 auto;
  }

  header{
    padding:8px 18px 10px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  h1{
    font-size:17px;
    margin:0;
    font-weight:650;
    letter-spacing:-0.01em;
  }
  .badge{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent);
    background:rgba(255,180,84,0.12);
    padding:4px 8px;
    border-radius:6px;
  }

  .camera-wrap{
    position:relative;
    margin:2px 16px 12px;
    width:calc(100% - 32px);
    aspect-ratio:1/1;
    border-radius:20px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 0 1px var(--line);
  }
  .zoom-wrap{
    position:absolute;
    inset:0;
    transform-origin:center center;
  }
  video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  #overlayLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .code-box{
    position:absolute;
    border:2.5px solid var(--accent);
    border-radius:8px;
    background:rgba(255,180,84,0.12);
    pointer-events:auto;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.06);
  }
  .code-box .tag{
    position:absolute;
    top:-24px; left:0;
    background:var(--accent);
    color:var(--accent-ink);
    font-size:10.5px;
    font-weight:700;
    padding:3px 8px;
    border-radius:6px;
    white-space:nowrap;
    max-width:160px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .code-box.tapped{ background:rgba(94,230,168,0.28); border-color:#5ee6a8; }
  .code-box.tapped .tag{ background:#5ee6a8; }

  .status-pill{
    position:absolute;
    top:12px; left:50%;
    transform:translateX(-50%);
    background:rgba(10,11,15,0.62);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    padding:6px 13px;
    border-radius:100px;
    font-size:11.5px;
    color:var(--text);
    letter-spacing:0.01em;
    white-space:nowrap;
    max-width:88%;
    overflow:hidden;
    text-overflow:ellipsis;
    z-index:5;
  }

  .flash{
    position:absolute; inset:0;
    background:var(--accent);
    opacity:0;
    pointer-events:none;
    z-index:6;
  }
  .flash.hit{ animation:flash 320ms ease-out; }
  @keyframes flash{ 0%{opacity:0.4;} 100%{opacity:0;} }

  .unsupported{
    padding:28px 24px;
    text-align:center;
    color:var(--sub);
    font-size:13.5px;
    line-height:1.6;
  }
  .unsupported b{ color:var(--text); }

  .zoom-row{
    position:absolute;
    left:14px; right:14px;
    bottom:12px;
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(10,11,15,0.62);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border-radius:100px;
    padding:6px 10px;
    z-index:5;
  }
  .zoom-row button{
    width:26px; height:26px;
    flex-shrink:0;
    border-radius:50%;
    border:none;
    background:var(--panel-2);
    color:var(--text);
    font-size:15px;
    font-weight:700;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .zoom-row input[type="range"]{
    flex:1;
    -webkit-appearance:none;
    appearance:none;
    height:3px;
    border-radius:3px;
    background:var(--line);
    outline:none;
  }
  .zoom-row input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--accent);
  }
  .zoom-row .zoom-label{
    font-size:10.5px;
    color:var(--sub);
    flex-shrink:0;
    width:30px;
    text-align:center;
  }

  .result-card{
    margin:0 16px 12px;
    padding:16px 18px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .result-card .empty{
    color:var(--sub);
    font-size:13.5px;
  }
  .result-card .code{
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    font-size:21px;
    font-weight:650;
    letter-spacing:-0.01em;
    word-break:break-all;
    line-height:1.25;
  }
  .result-card .copied-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--accent);
    margin-top:5px;
  }
  .copy-btn{
    flex-shrink:0;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:10px;
    padding:10px 16px;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
  }
  .copy-btn:active{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }

  .manual-row{
    display:flex;
    gap:8px;
    padding:0 16px 10px;
  }
  .manual-row input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:11px;
    color:var(--text);
    padding:11px 13px;
    font-family:inherit;
    font-size:14px;
    min-width:0;
  }
  .manual-row input::placeholder{ color:var(--sub); }
  .manual-row input:focus{ outline:none; border-color:var(--accent); }
  .manual-row button{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:11px;
    padding:0 18px;
    font-family:inherit;
    font-size:13px;
    font-weight:650;
    flex-shrink:0;
  }

  .history{
    max-height:34vh;
    overflow-y:auto;
    border-top:1px solid var(--line);
  }
  .history-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 18px 4px;
  }
  .history-head span{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:650;
  }
  .history-head button{
    background:none;
    border:none;
    color:var(--sub);
    font-family:inherit;
    font-size:12px;
  }
  ul.log{
    list-style:none;
    margin:0;
    padding:0 18px 8px;
  }
  ul.log li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    gap:10px;
  }
  ul.log li:last-child{ border-bottom:none; }
  ul.log .code{
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    font-size:13.5px;
    word-break:break-all;
  }
  ul.log .time{ font-size:10.5px; color:var(--sub); flex-shrink:0; margin-top:2px; }
  ul.log button{
    background:none;
    border:1px solid var(--line);
    color:var(--sub);
    border-radius:7px;
    padding:5px 9px;
    font-size:10.5px;
    font-weight:650;
    font-family:inherit;
    flex-shrink:0;
  }
  .empty-log{ color:var(--sub); font-size:12.5px; padding:6px 0 12px; }
</style>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="app">
  <header>
    <h1>SKU Scanner</h1>
    <span class="badge">Live</span>
  </header>

  <div id="cameraSection" class="camera-wrap">
    <div class="zoom-wrap" id="zoomWrap">
      <video id="video" playsinline muted autoplay></video>
      <div id="overlayLayer"></div>
    </div>
    <div class="status-pill" id="status">Loading camera...</div>
    <div class="flash" id="flash"></div>
    <div class="zoom-row" id="zoomRow">
      <button id="zoomOut" type="button">&minus;</button>
      <input id="zoomSlider" type="range" min="1" max="3" step="0.05" value="1">
      <button id="zoomIn" type="button">+</button>
      <span class="zoom-label" id="zoomLabel">1.0x</span>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div id="resultBody"><span class="empty">No code scanned yet</span></div>
    <button class="copy-btn" id="copyLastBtn" style="display:none;">Copy</button>
  </div>

  <div class="manual-row">
    <input id="manualInput" type="text" inputmode="text" placeholder="Type a SKU manually" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="manualAdd">Add</button>
  </div>

  <div class="history">
    <div class="history-head">
      <span>History</span>
      <button id="clearHistory">Clear</button>
    </div>
    <ul class="log" id="log"></ul>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const zoomWrap = document.getElementById('zoomWrap');
  const overlayLayer = document.getElementById('overlayLayer');
  const statusEl = document.getElementById('status');
  const flashEl = document.getElementById('flash');
  const cameraSection = document.getElementById('cameraSection');
  const logEl = document.getElementById('log');
  const resultBody = document.getElementById('resultBody');
  const copyLastBtn = document.getElementById('copyLastBtn');
  const manualInput = document.getElementById('manualInput');
  const manualAdd = document.getElementById('manualAdd');
  const clearHistoryBtn = document.getElementById('clearHistory');
  const zoomRow = document.getElementById('zoomRow');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomLabel = document.getElementById('zoomLabel');
  const zoomOutBtn = document.getElementById('zoomOut');
  const zoomInBtn = document.getElementById('zoomIn');

  let history = [];
  let lastCode = null;

  function timeString(){
    const d = new Date();
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return h + ':' + m + ' ' + ampm;
  }

  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return Promise.resolve();
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderResult(code){
    resultBody.innerHTML =
      '<div class="code">' + escapeHtml(code) + '</div>' +
      '<div class="copied-tag">&#10003; Copied to clipboard</div>';
    copyLastBtn.style.display = 'inline-block';
    copyLastBtn.textContent = 'Copy again';
  }

  function renderHistory(){
    if(history.length === 0){
      logEl.innerHTML = '<li class="empty-log" style="border:none;">Scanned codes will appear here</li>';
      return;
    }
    logEl.innerHTML = history.map((item, idx) => (
      '<li>' +
        '<div><div class="code">' + escapeHtml(item.code) + '</div><div class="time">' + item.time + '</div></div>' +
        '<button data-idx="' + idx + '">COPY</button>' +
      '</li>'
    )).join('');
  }

  logEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-idx]');
    if(!btn) return;
    const idx = parseInt(btn.getAttribute('data-idx'), 10);
    const item = history[idx];
    if(!item) return;
    copyText(item.code).then(() => {
      btn.textContent = 'DONE';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1100);
    });
  });

  copyLastBtn.addEventListener('click', () => {
    if(!lastCode) return;
    copyText(lastCode).then(() => {
      copyLastBtn.textContent = 'Copied';
      setTimeout(() => { copyLastBtn.textContent = 'Copy again'; }, 1100);
    });
  });

  clearHistoryBtn.addEventListener('click', () => {
    history = [];
    renderHistory();
  });

  // Selecting a highlighted code (tap) does exactly what a scan used to do:
  // copy it to the clipboard and drop it into the result card + history.
  function selectCode(code){
    lastCode = code;
    history.unshift({code, time: timeString()});
    if(history.length > 50) history.pop();
    renderResult(code);
    renderHistory();
    copyText(code);
    flashEl.classList.remove('hit');
    void flashEl.offsetWidth;
    flashEl.classList.add('hit');
    if(navigator.vibrate) navigator.vibrate(50);
  }

  manualAdd.addEventListener('click', () => {
    const val = manualInput.value.trim();
    if(!val) return;
    selectCode(val);
    manualInput.value = '';
  });
  manualInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ manualAdd.click(); }
  });

  renderHistory();

  // ---- Camera + continuous multi-code live detection (like iPhone's Camera app QR view) ----
  let codeReader = null;
  let videoTrack = null;
  let hasHardwareZoom = false;
  let zoomMin = 1, zoomMax = 3;
  let zoomLevel = 1;
  let detecting = false;
  let barcodeTickCounter = 0;

  function setZoomLabel(v){ zoomLabel.textContent = v.toFixed(1) + 'x'; }

  async function applyZoom(value){
    value = Math.min(zoomMax, Math.max(zoomMin, value));
    zoomLevel = value;
    zoomSlider.value = value;
    setZoomLabel(value);
    if(hasHardwareZoom && videoTrack){
      try{ await videoTrack.applyConstraints({ advanced: [{ zoom: value }] }); }
      catch(e){ zoomWrap.style.transform = 'scale(' + value + ')'; }
    }else{
      zoomWrap.style.transform = 'scale(' + value + ')';
    }
  }

  zoomSlider.addEventListener('input', () => applyZoom(parseFloat(zoomSlider.value)));
  zoomOutBtn.addEventListener('click', () => applyZoom(zoomLevel - 0.2));
  zoomInBtn.addEventListener('click', () => applyZoom(zoomLevel + 0.2));

  let pinchStartDist = null;
  let pinchStartZoom = 1;
  function touchDist(touches){
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }
  cameraSection.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2){ pinchStartDist = touchDist(e.touches); pinchStartZoom = zoomLevel; }
  }, { passive: true });
  cameraSection.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && pinchStartDist){
      e.preventDefault();
      applyZoom(pinchStartZoom * (touchDist(e.touches) / pinchStartDist));
    }
  }, { passive: false });
  cameraSection.addEventListener('touchend', (e) => {
    if(e.touches.length < 2) pinchStartDist = null;
  });

  async function startCamera(){
    if(typeof ZXing === 'undefined' && typeof jsQR === 'undefined'){
      showUnsupported('Scanning libraries failed to load — check your connection and reload.');
      return;
    }
    if(typeof ZXing !== 'undefined'){
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.ITF
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      codeReader = new ZXing.BrowserMultiFormatReader(hints, 150);
    }

    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      videoTrack = stream.getVideoTracks()[0];

      if(videoTrack.getCapabilities){
        try{
          const caps = videoTrack.getCapabilities();
          if(caps.zoom){
            hasHardwareZoom = true;
            zoomMin = caps.zoom.min ?? 1;
            zoomMax = caps.zoom.max ?? 3;
            zoomSlider.min = zoomMin; zoomSlider.max = zoomMax;
            zoomSlider.step = caps.zoom.step ?? 0.1;
            zoomSlider.value = zoomMin; zoomLevel = zoomMin;
            setZoomLabel(zoomMin);
          }
        }catch(e){}
      }

      statusEl.textContent = 'Point at any code';
      startDetectionLoop();
    }catch(err){
      statusEl.textContent = 'Camera access denied — enable it in Settings';
      zoomRow.style.display = 'none';
    }
  }

  // Finds every QR code jsQR can see in one frame by repeatedly masking out
  // whatever it just found and searching again — jsQR itself only returns one
  // result per call, so this is the standard trick to get multiple.
  function findAllQRCodes(imageData, maxCodes){
    const codes = [];
    const data = new Uint8ClampedArray(imageData.data);
    const w = imageData.width, h = imageData.height;
    for(let i = 0; i < maxCodes; i++){
      const result = jsQR(data, w, h);
      if(!result) break;
      codes.push(result);
      const pts = [result.location.topLeftCorner, result.location.topRightCorner,
                   result.location.bottomRightCorner, result.location.bottomLeftCorner];
      const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
      const minX = Math.max(0, Math.floor(Math.min(...xs)) - 4);
      const maxX = Math.min(w, Math.ceil(Math.max(...xs)) + 4);
      const minY = Math.max(0, Math.floor(Math.min(...ys)) - 4);
      const maxY = Math.min(h, Math.ceil(Math.max(...ys)) + 4);
      for(let y = minY; y < maxY; y++){
        for(let x = minX; x < maxX; x++){
          const idx = (y * w + x) * 4;
          data[idx] = 0; data[idx+1] = 0; data[idx+2] = 0; data[idx+3] = 255;
        }
      }
    }
    return codes;
  }

  function nativeToCss(x, y){
    const vw = video.videoWidth, vh = video.videoHeight;
    const cw = video.clientWidth, ch = video.clientHeight;
    const scale = Math.max(cw / vw, ch / vh);
    const dispW = vw * scale, dispH = vh * scale;
    const offX = (dispW - cw) / 2, offY = (dispH - ch) / 2;
    return { x: x * scale - offX, y: y * scale - offY };
  }

  function renderBoxes(entries){
    overlayLayer.innerHTML = '';
    entries.forEach((entry, idx) => {
      const box = document.createElement('div');
      box.className = 'code-box';
      if(entry.rect){
        box.style.left = entry.rect.x + 'px';
        box.style.top = entry.rect.y + 'px';
        box.style.width = entry.rect.w + 'px';
        box.style.height = entry.rect.h + 'px';
      }else{
        // No position available (e.g. some barcode reads) — show a bar across the bottom of the view
        box.style.left = '8%';
        box.style.right = '8%';
        box.style.bottom = '18%';
        box.style.width = 'auto';
        box.style.height = '40px';
      }
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.textContent = entry.text.length > 22 ? entry.text.slice(0, 22) + '…' : entry.text;
      box.appendChild(tag);
      box.addEventListener('click', () => {
        box.classList.add('tapped');
        selectCode(entry.text);
        setTimeout(() => box.classList.remove('tapped'), 500);
      });
      overlayLayer.appendChild(box);
    });
    statusEl.textContent = entries.length > 0
      ? entries.length + ' code' + (entries.length > 1 ? 's' : '') + ' found — tap one'
      : 'Point at any code';
  }

  async function detectTick(){
    if(detecting || !video.videoWidth){ scheduleNextTick(); return; }
    detecting = true;

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const entries = [];

    if(typeof jsQR === 'function'){
      try{
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qrCodes = findAllQRCodes(imageData, 4);
        qrCodes.forEach(q => {
          const pts = [q.location.topLeftCorner, q.location.topRightCorner,
                       q.location.bottomRightCorner, q.location.bottomLeftCorner]
                       .map(p => nativeToCss(p.x, p.y));
          const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
          const minX = Math.min(...xs), maxX = Math.max(...xs);
          const minY = Math.min(...ys), maxY = Math.max(...ys);
          entries.push({
            text: q.data,
            rect: { x: minX, y: minY, w: Math.max(30, maxX - minX), h: Math.max(30, maxY - minY) }
          });
        });
      }catch(e){}
    }

    // Barcode detection (ZXing) — checked less often since it's heavier (data URL + image
    // decode round trip), only when no QR already found this tick.
    barcodeTickCounter++;
    if(entries.length === 0 && codeReader && barcodeTickCounter % 2 === 0){
      try{
        const result = await codeReader.decodeFromImageUrl(canvas.toDataURL('image/png'));
        if(result){
          const text = result.getText();
          let rect = null;
          try{
            const points = result.getResultPoints();
            if(points && points.length >= 2){
              const pts = points.map(p => nativeToCss(p.getX(), p.getY()));
              const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
              const minX = Math.min(...xs) - 30, maxX = Math.max(...xs) + 30;
              const minY = Math.min(...ys) - 20, maxY = Math.max(...ys) + 20;
              rect = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            }
          }catch(e){}
          entries.push({ text, rect });
        }
      }catch(e){ /* no barcode found this tick */ }
    }

    renderBoxes(entries);
    detecting = false;
    scheduleNextTick();
  }

  function scheduleNextTick(){
    setTimeout(detectTick, 450);
  }

  function startDetectionLoop(){
    detectTick();
  }

  function showUnsupported(message){
    cameraSection.innerHTML = '<div class="unsupported">' +
      '<b>' + (message || 'Live camera scanning isn\'t available right now.') + '</b><br><br>' +
      'You can still use the manual entry field below to add SKUs — copy and history work the same either way.' +
      '</div>';
  }

  startCamera();
})();
</script>
</body>
</html>
